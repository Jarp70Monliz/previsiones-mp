<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Previsiones MP – MONLIZ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/msal.js/2.38.3/msal-browser.min.js"></script>
<style>
  :root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --primary: #1a6f3c;
    --primary-light: #e8f5ee;
    --primary-dark: #145730;
    --accent: #f59e0b;
    --border: #d1d5db;
    --text: #111827;
    --muted: #6b7280;
    --danger: #dc2626;
    --success: #16a34a;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--primary);
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    position: sticky; top: 0; z-index: 100;
  }
  header .logo { font-size: 20px; font-weight: 800; letter-spacing: 1px; }
  header .subtitle { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  #userLabel { font-size: 12px; opacity: .85; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .main { max-width: 600px; margin: 0 auto; padding: 16px; }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  label { font-size: 13px; font-weight: 600; color: var(--muted); }
  input, select {
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    background: white;
    color: var(--text);
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
  select:disabled { background: #f9fafb; color: #9ca3af; }
  input[type=number] { font-size: 18px; font-weight: 700; color: var(--primary); }

  .btn {
    padding: 13px 20px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all .2s;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover, .btn-primary:active { background: var(--primary-dark); }
  .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }
  .btn-secondary { background: #f3f4f6; color: var(--text); border: 1px solid var(--border); }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:active { background: #d97706; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-sm { padding: 7px 14px; font-size: 13px; width: auto; margin-bottom: 0; border-radius: 6px; }

  .status-bar {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-info    { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
  .status-success { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; }
  .status-error   { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
  .status-loading { background: #fefce8; color: #92400e; border: 1px solid #fde68a; }

  .auth-area { text-align: center; padding: 30px 16px; }
  .auth-area p { color: var(--muted); margin-bottom: 20px; font-size: 15px; line-height: 1.5; }

  /* LISTA PREVISIONES */
  .prev-item {
    background: var(--primary-light);
    border: 1px solid #c6e8d4;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
    position: relative;
  }
  .prev-item .prev-title { font-weight: 700; font-size: 14px; color: var(--primary-dark); margin-bottom: 4px; }
  .prev-item .prev-detail { font-size: 12px; color: var(--muted); }
  .prev-item .prev-kg { font-size: 18px; font-weight: 800; color: var(--primary); float: right; margin-top: -2px; }
  .prev-item .btn-remove { position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 18px; cursor: pointer; color: var(--muted); line-height: 1; }
  .prev-item.saved { background: #f0fdf4; border-color: #bbf7d0; }
  .prev-item.error { background: #fef2f2; border-color: #fecaca; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; margin-left: 6px; }
  .badge-saved { background: #dcfce7; color: #15803d; }
  .badge-error { background: #fee2e2; color: #991b1b; }

  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; padding: 20px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<header>
  <div style="flex:1;">
    <div class="logo">🌿 MONLIZ</div>
    <div class="subtitle">Previsiones de Entrada de MP</div>
  </div>
  <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
    <span id="userLabel"></span>
    <button class="btn btn-secondary btn-sm" id="authBtn" onclick="toggleAuth()">Iniciar sesión</button>
  </div>
</header>

<div class="main">

  <div id="statusBar" class="status-bar status-info" style="display:none;"></div>

  <!-- AUTH -->
  <div id="authRequired" class="card auth-area" style="display:none;">
    <p>Inicia sesión con tu cuenta de MONLIZ para registrar previsiones de entrada de materia prima.</p>
    <button class="btn btn-primary" style="font-size:16px;" onclick="login()">🔐 Iniciar sesión con Microsoft</button>
  </div>

  <!-- BOTÓN CARGAR MAESTRO -->
  <div id="loadSection" style="display:none;">
    <button class="btn btn-accent" onclick="loadMasterData()">📂 Cargar datos del Excel</button>
  </div>

  <!-- FORMULARIO -->
  <div class="card" id="formCard" style="display:none;">
    <div class="card-title">📋 Nueva Previsión</div>

    <div class="form-group">
      <label>Fecha Previsión *</label>
      <input type="date" id="fFecha"/>
    </div>
    <div class="form-group">
      <label>Agricultor *</label>
      <select id="fAgricultor" onchange="onAgricultorChange()">
        <option value="">— Selecciona agricultor —</option>
      </select>
    </div>
    <div class="form-group">
      <label>Cultivo *</label>
      <select id="fCultivo" onchange="onCultivoChange()" disabled>
        <option value="">— Primero elige agricultor —</option>
      </select>
    </div>
    <div class="form-group">
      <label>Finca *</label>
      <select id="fFinca" onchange="onFincaChange()" disabled>
        <option value="">— Primero elige cultivo —</option>
      </select>
    </div>
    <div class="form-group">
      <label>Variedad</label>
      <select id="fVariedad" disabled>
        <option value="">— Primero elige finca —</option>
      </select>
    </div>
    <div class="form-group">
      <label>Kilos Previstos *</label>
      <input type="number" id="fKilos" min="0" step="1" placeholder="0"/>
    </div>
    <div class="form-group">
      <label>Observaciones</label>
      <input type="text" id="fObs" placeholder="Opcional..."/>
    </div>

    <button class="btn btn-primary" onclick="addToQueue()">➕ Añadir a la lista</button>
    <button class="btn btn-secondary" onclick="clearForm()">🔄 Limpiar formulario</button>
  </div>

  <!-- LISTA PENDIENTES -->
  <div class="card" id="queueCard" style="display:none;">
    <div class="card-title">
      📤 Previsiones
      <span id="queueCount" style="background:var(--accent);color:white;border-radius:20px;padding:2px 10px;font-size:13px;margin-left:4px;"></span>
    </div>
    <div id="queueList"></div>
    <button class="btn btn-primary" id="btnSave" onclick="saveAll()">💾 Guardar todo en Excel</button>
    <button class="btn btn-danger" onclick="clearQueue()">🗑️ Vaciar lista</button>
  </div>

</div>

<script>
// ─── CONFIGURACIÓN FIJA ───────────────────────────────────────────
const CLIENT_ID  = 'ccac899f-5430-4743-b434-fe322343f060';
const TENANT_ID  = 'fc39392a-a68b-4aca-9c38-97640b1afce4';
const FILE_URL   = 'https://monliz-my.sharepoint.com/personal/juancarlos_moruno_monliz_es/Documents/ENTRADAS%20MATERIA%20PRIMA/FINCAS.xlsm';
const SHEET_MASTER = 'Datos';
const SHEET_PREV   = 'Previsiones';
const SCOPES = ['Files.ReadWrite', 'Sites.ReadWrite.All'];

// ─── STATE ───────────────────────────────────────────────────────
let msalInstance = null;
let token = null;
let masterData = [];
let queue = [];
let driveId = '', itemId = '';

// ─── INIT ─────────────────────────────────────────────────────────
window.onload = () => {
  document.getElementById('fFecha').value = new Date().toISOString().split('T')[0];
  initMsal();
};

function initMsal() {
  msalInstance = new msal.PublicClientApplication({
    auth: {
      clientId: CLIENT_ID,
      authority: `https://login.microsoftonline.com/${TENANT_ID}`,
      redirectUri: window.location.origin + window.location.pathname
    },
    cache: { cacheLocation: 'sessionStorage' }
  });
  msalInstance.handleRedirectPromise().then(resp => {
    if (resp) { token = resp.accessToken; onLoggedIn(resp.account); }
    else {
      const accounts = msalInstance.getAllAccounts();
      if (accounts.length > 0) acquireTokenSilent(accounts[0]);
      else {
        document.getElementById('authRequired').style.display = 'block';
        showStatus('Inicia sesión para continuar.', 'info');
      }
    }
  }).catch(e => showStatus('Error de autenticación: ' + e.message, 'error'));
}

async function acquireTokenSilent(account) {
  try {
    const res = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account });
    token = res.accessToken;
    onLoggedIn(account);
  } catch(e) {
    document.getElementById('authRequired').style.display = 'block';
    showStatus('Sesión expirada. Inicia sesión de nuevo.', 'info');
  }
}

function login() {
  msalInstance.loginRedirect({ scopes: SCOPES });
}

function onLoggedIn(account) {
  document.getElementById('authRequired').style.display = 'none';
  document.getElementById('loadSection').style.display = 'block';
  document.getElementById('userLabel').textContent = account.name || account.username;
  document.getElementById('authBtn').textContent = 'Salir';
  showStatus('Sesión iniciada. Pulsa "Cargar datos del Excel" para comenzar.', 'success');
}

function toggleAuth() {
  if (token) msalInstance.logoutRedirect();
  else login();
}

// ─── GRAPH API ────────────────────────────────────────────────────
async function graphGet(endpoint) {
  const res = await fetch('https://graph.microsoft.com/v1.0' + endpoint, {
    headers: { Authorization: 'Bearer ' + token }
  });
  if (!res.ok) throw new Error(`Graph ${res.status}: ${await res.text()}`);
  return res.json();
}

async function graphPatch(endpoint, body) {
  const res = await fetch('https://graph.microsoft.com/v1.0' + endpoint, {
    method: 'PATCH',
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`Graph PATCH ${res.status}: ${await res.text()}`);
  return res.json();
}

async function graphPost(endpoint, body) {
  const res = await fetch('https://graph.microsoft.com/v1.0' + endpoint, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`Graph POST ${res.status}: ${await res.text()}`);
  return res.json();
}

async function resolveFileIds() {
  // OneDrive personal/organizativo vía path
  const u = new URL(FILE_URL);
  const host = u.hostname;
  // Extraer ruta relativa al drive: /personal/.../Documents/...
  const pathParts = u.pathname.split('/');
  // /personal/user/Documents/... → sitio es /personal/user
  const sitePath = '/' + pathParts.slice(1,3).join('/');
  const filePath = '/' + decodeURIComponent(pathParts.slice(3).join('/'));

  const site = await graphGet(`/sites/${host}:${sitePath}`);
  const drives = await graphGet(`/sites/${site.id}/drives`);
  for (const d of drives.value) {
    try {
      const item = await graphGet(`/drives/${d.id}/root:${filePath}`);
      driveId = d.id; itemId = item.id; return;
    } catch(e) { /* siguiente drive */ }
  }
  throw new Error('No se encontró el archivo FINCAS.xlsm. Verifica que tienes acceso.');
}

// ─── CARGAR MAESTRO ───────────────────────────────────────────────
async function loadMasterData() {
  showStatus('Conectando con SharePoint...', 'loading');
  try {
    await resolveFileIds();
    const sheet = encodeURIComponent(SHEET_MASTER);
    const data = await graphGet(`/drives/${driveId}/items/${itemId}/workbook/worksheets('${sheet}')/usedRange`);
    const rows = data.values;
    if (!rows || rows.length < 2) throw new Error('La hoja "Datos" está vacía.');

    const headers = rows[0].map(h => (h+'').trim().toLowerCase());
    const iAgr = headers.findIndex(h => h.includes('agricultor'));
    const iCul = headers.findIndex(h => h.includes('cultivo'));
    const iFin = headers.findIndex(h => h.includes('finca'));
    const iVar = headers.findIndex(h => h.includes('variedad'));
    if (iAgr < 0 || iCul < 0) throw new Error('No se encontraron columnas Agricultor/Cultivo en la hoja "Datos".');

    masterData = rows.slice(1).filter(r => r[iAgr]).map(r => ({
      agricultor: (r[iAgr]||'').toString().trim(),
      cultivo:    (r[iCul]||'').toString().trim(),
      finca:      iFin >= 0 ? (r[iFin]||'').toString().trim() : '',
      variedad:   iVar >= 0 ? (r[iVar]||'').toString().trim() : ''
    }));

    await ensurePrevisionesSheet();
    populateAgricultores();
    document.getElementById('loadSection').style.display = 'none';
    document.getElementById('formCard').style.display = 'block';
    showStatus(`✅ ${masterData.length} registros cargados. ¡Listo para introducir previsiones!`, 'success');
  } catch(e) {
    showStatus('Error: ' + e.message, 'error');
  }
}

async function ensurePrevisionesSheet() {
  try {
    await graphGet(`/drives/${driveId}/items/${itemId}/workbook/worksheets('${encodeURIComponent(SHEET_PREV)}')`);
  } catch(e) {
    await graphPost(`/drives/${driveId}/items/${itemId}/workbook/worksheets`, { name: SHEET_PREV });
    await graphPatch(
      `/drives/${driveId}/items/${itemId}/workbook/worksheets('${encodeURIComponent(SHEET_PREV)}')/range(address='A1:H1')`,
      { values: [['Fecha Previsión','Fecha Registro','Agricultor','Cultivo','Finca','Variedad','Kilos Previstos','Observaciones']] }
    );
  }
}

// ─── FORMULARIO ENCADENADO ────────────────────────────────────────
function unique(arr) { return [...new Set(arr.filter(Boolean))].sort(); }

function populateSelect(id, values, placeholder, disabled) {
  const sel = document.getElementById(id);
  sel.innerHTML = `<option value="">${placeholder}</option>`;
  values.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; sel.appendChild(o); });
  sel.disabled = disabled;
}

function populateAgricultores() {
  populateSelect('fAgricultor', unique(masterData.map(r => r.agricultor)), '— Selecciona agricultor —', false);
  populateSelect('fCultivo', [], '— Primero elige agricultor —', true);
  populateSelect('fFinca', [], '— Primero elige cultivo —', true);
  populateSelect('fVariedad', [], '— Primero elige finca —', true);
}

function onAgricultorChange() {
  const agr = document.getElementById('fAgricultor').value;
  const cultivos = unique(masterData.filter(r => r.agricultor === agr).map(r => r.cultivo));
  populateSelect('fCultivo', cultivos, agr ? '— Selecciona cultivo —' : '— Primero elige agricultor —', !agr);
  populateSelect('fFinca', [], '— Primero elige cultivo —', true);
  populateSelect('fVariedad', [], '— Primero elige finca —', true);
}

function onCultivoChange() {
  const agr = document.getElementById('fAgricultor').value;
  const cul = document.getElementById('fCultivo').value;
  const fincas = unique(masterData.filter(r => r.agricultor === agr && r.cultivo === cul).map(r => r.finca));
  populateSelect('fFinca', fincas, cul ? '— Selecciona finca —' : '— Primero elige cultivo —', !cul);
  populateSelect('fVariedad', [], '— Primero elige finca —', true);
}

function onFincaChange() {
  const agr = document.getElementById('fAgricultor').value;
  const cul = document.getElementById('fCultivo').value;
  const fin = document.getElementById('fFinca').value;
  const vars = unique(masterData.filter(r => r.agricultor === agr && r.cultivo === cul && r.finca === fin).map(r => r.variedad));
  populateSelect('fVariedad', vars, fin ? '— Selecciona variedad —' : '— Primero elige finca —', !fin);
}

// ─── COLA ─────────────────────────────────────────────────────────
function addToQueue() {
  const fecha    = document.getElementById('fFecha').value;
  const agr      = document.getElementById('fAgricultor').value;
  const cultivo  = document.getElementById('fCultivo').value;
  const finca    = document.getElementById('fFinca').value;
  const variedad = document.getElementById('fVariedad').value;
  const kilos    = document.getElementById('fKilos').value;
  const obs      = document.getElementById('fObs').value;

  if (!fecha || !agr || !cultivo || !finca || !kilos) {
    showStatus('⚠️ Completa: Fecha, Agricultor, Cultivo, Finca y Kilos.', 'error');
    return;
  }
  queue.push({ id: Date.now(), fecha, agr, cultivo, finca, variedad, kilos: parseInt(kilos), obs, estado: 'pendiente' });
  renderQueue();
  clearForm();
  showStatus('Registro añadido. Añade más o pulsa "Guardar todo en Excel".', 'success');
}

function renderQueue() {
  const list = document.getElementById('queueList');
  if (queue.length === 0) {
    document.getElementById('queueCard').style.display = 'none';
    list.innerHTML = '';
    return;
  }
  document.getElementById('queueCard').style.display = 'block';
  document.getElementById('queueCount').textContent = queue.length;
  list.innerHTML = queue.map((r, i) => {
    const cls = r.estado === 'guardado' ? 'saved' : r.estado === 'error' ? 'error' : '';
    const badge = r.estado === 'guardado' ? '<span class="badge badge-saved">✅ Guardado</span>'
                : r.estado === 'error'    ? '<span class="badge badge-error">❌ Error</span>' : '';
    const btnRemove = r.estado === 'pendiente' ? `<button class="btn-remove" onclick="removeRow(${i})">×</button>` : '';
    return `
      <div class="prev-item ${cls}" id="item_${r.id}">
        ${btnRemove}
        <div class="prev-title">${r.agr} · ${r.cultivo} ${badge}</div>
        <div class="prev-detail">${r.finca}${r.variedad ? ' · ' + r.variedad : ''} · ${r.fecha}</div>
        <div class="prev-kg">${r.kilos.toLocaleString('es-ES')} kg</div>
        ${r.obs ? `<div class="prev-detail" style="margin-top:4px;">📝 ${r.obs}</div>` : ''}
      </div>`;
  }).join('');
}

function removeRow(i) { queue.splice(i, 1); renderQueue(); }

function clearQueue() {
  if (!confirm('¿Vaciar la lista?')) return;
  queue = []; renderQueue();
}

function clearForm() {
  document.getElementById('fAgricultor').value = '';
  document.getElementById('fKilos').value = '';
  document.getElementById('fObs').value = '';
  document.getElementById('fFecha').value = new Date().toISOString().split('T')[0];
  onAgricultorChange();
}

// ─── GUARDAR EN EXCEL ─────────────────────────────────────────────
async function saveAll() {
  const pending = queue.filter(r => r.estado === 'pendiente');
  if (!pending.length) { showStatus('No hay previsiones pendientes.', 'info'); return; }
  if (!token || !driveId) { showStatus('Primero carga el Excel.', 'error'); return; }

  document.getElementById('btnSave').disabled = true;
  showStatus(`Guardando ${pending.length} registro(s)...`, 'loading');

  const now = new Date().toLocaleString('es-ES');
  const sheet = encodeURIComponent(SHEET_PREV);

  let lastRow = 1;
  try {
    const used = await graphGet(`/drives/${driveId}/items/${itemId}/workbook/worksheets('${sheet}')/usedRange`);
    lastRow = used.rowCount || 1;
  } catch(e) {}

  let saved = 0;
  for (let i = 0; i < queue.length; i++) {
    const r = queue[i];
    if (r.estado !== 'pendiente') continue;
    try {
      const row = lastRow + 1 + saved;
      await graphPatch(
        `/drives/${driveId}/items/${itemId}/workbook/worksheets('${sheet}')/range(address='A${row}:H${row}')`,
        { values: [[r.fecha, now, r.agr, r.cultivo, r.finca, r.variedad||'', r.kilos, r.obs||'']] }
      );
      queue[i].estado = 'guardado';
      saved++;
    } catch(e) {
      queue[i].estado = 'error';
    }
    renderQueue();
  }

  document.getElementById('btnSave').disabled = false;
  const errors = queue.filter(r => r.estado === 'error').length;
  if (errors > 0)
    showStatus(`⚠️ ${saved} guardados, ${errors} con error. Comprueba tu conexión.`, 'error');
  else
    showStatus(`✅ ${saved} previsión(es) guardadas correctamente en FINCAS.xlsm`, 'success');
}

// ─── UTILS ────────────────────────────────────────────────────────
function showStatus(msg, type) {
  const bar = document.getElementById('statusBar');
  bar.className = `status-bar status-${type}`;
  bar.textContent = msg;
  bar.style.display = 'flex';
}
</script>
</body>
</html>
